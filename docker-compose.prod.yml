version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: webgenix-postgres-prod
    restart: always
    environment:
      # SECURITY: Use Docker secrets or external secret management in production
      # Example: docker secret create postgres_password /run/secrets/postgres_password
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_THIS_IN_PRODUCTION}
      POSTGRES_DB: ${POSTGRES_DB:-webgenix_prod}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5433}:5432" # Use 5433 to avoid conflicts with dev
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      # - ./backups:/backups # Uncomment for backup volume
    networks:
      - webgenix_prod_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: webgenix-redis-prod
    restart: always
    # SECURITY: Uncomment and configure Redis password in production
    # command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6380}:6379" # Use 6380 to avoid conflicts with dev
    volumes:
      - redis_data_prod:/data
      # - ./redis.conf:/usr/local/etc/redis/redis.conf # Uncomment for custom config
    networks:
      - webgenix_prod_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

