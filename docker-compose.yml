services:
  traefik:
    image: traefik:v3.7
    container_name: aseanflow-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@aseanflow.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      # 8080 removed — traefik dashboard must not be public
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt_data:/letsencrypt
    networks:
      - aseanflow

  postgres:
    image: postgres:16-alpine
    container_name: aseanflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aseanflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aseanflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: aseanflow-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    networks:
      - aseanflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    container_name: aseanflow-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aseanflow}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aseanflow

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aseanflow-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aseanflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL:-https://localhost}
      APILAYER_API_KEY: ${APILAYER_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MORPH_RPC_URL: ${MORPH_RPC_URL:-https://rpc-hoodi.morph.network}
      MORPH_CHAIN_ID: ${MORPH_CHAIN_ID:-2910}
      MORPH_PRIVATE_KEY: ${MORPH_PRIVATE_KEY:-}
      REWARD_TOKEN_ADDRESS: ${REWARD_TOKEN_ADDRESS:-}
      WALLET_ENCRYPTION_KEY: ${WALLET_ENCRYPTION_KEY:-}
      REWARD_FEE_DISCOUNT_THRESHOLD: ${REWARD_FEE_DISCOUNT_THRESHOLD:-100}
      REWARD_FEE_DISCOUNT_PERCENT: ${REWARD_FEE_DISCOUNT_PERCENT:-50}
    labels:
      traefik.enable: "true"
      traefik.http.routers.api.rule: "Host(`${API_HOST:-api.localhost}`)"
      traefik.http.routers.api.entrypoints: websecure
      traefik.http.routers.api.tls: "true"
      traefik.http.routers.api.tls.certresolver: letsencrypt
      traefik.http.services.api.loadbalancer.server.port: "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aseanflow

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: aseanflow-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-aseanflow}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MORPH_RPC_URL: ${MORPH_RPC_URL:-https://rpc-hoodi.morph.network}
      MORPH_CHAIN_ID: ${MORPH_CHAIN_ID:-2910}
      MORPH_PRIVATE_KEY: ${MORPH_PRIVATE_KEY:-}
      REWARD_TOKEN_ADDRESS: ${REWARD_TOKEN_ADDRESS:-}
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY:-}
      REWARD_AMOUNT: ${REWARD_AMOUNT:-10000000000000000000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aseanflow

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aseanflow-web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:3001
    labels:
      traefik.enable: "true"
      traefik.http.routers.web.rule: "Host(`${WEB_HOST:-localhost}`)"
      traefik.http.routers.web.entrypoints: websecure
      traefik.http.routers.web.tls: "true"
      traefik.http.routers.web.tls.certresolver: letsencrypt
      traefik.http.services.web.loadbalancer.server.port: "3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - aseanflow

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  letsencrypt_data:
    driver: local

networks:
  aseanflow:
    driver: bridge
